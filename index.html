<!DOCTYPE html>
<html>
<head>

<title>scribble.bet</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>scribble.bet</h1>

<!-- UPGRADE SCREEN -->

<div id="upgradeScreen">

<h2>Upgrade Your Ball</h2>

<div id="moneyDisplay"></div>

<label>Weapon:</label>

<select id="weaponSelect"></select>

<br><br>

<button onclick="buyUpgrade('hp')">
+20 HP ($50)
</button>

<button onclick="buyUpgrade('damage')">
+5 Damage ($75)
</button>

<br><br>

<button onclick="goToFight()">
Go To Fight
</button>

</div>

<!-- FIGHT SCREEN -->

<div id="fightScreen" class="hidden">

<h2>Fight Arena</h2>

<label>Bet Amount:</label>

<input id="betInput" value="50">

<button onclick="startFight()">
Start Fight
</button>

<br><br>

<canvas id="arena" width="600" height="400"></canvas>

<br>

<button onclick="returnToUpgrade()">
Back To Upgrades
</button>

</div>

<script src="game.js"></script>

</body>
</html>
