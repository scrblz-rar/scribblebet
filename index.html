<!DOCTYPE html>
<html>
<head>
<title>scribble.bet</title>

<link href="https://fonts.googleapis.com/css2?family=Lexend+Giga&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Lexend Giga', sans-serif;
    color:black;
    text-align:center;
    background:white;
    overflow-x:hidden;
    padding-top:30px;
}

/* BACKGROUND */
body::before {
    content:"";
    position:fixed;
    inset:0;
    background-image: repeating-linear-gradient(
        135deg,
        rgba(0,0,0,0.04) 0px,
        rgba(0,0,0,0.04) 18px,
        transparent 18px,
        transparent 40px
    );
    animation:bgmove 40s linear infinite;
    z-index:-1;
}

@keyframes bgmove {
    0% { transform: translate3d(0,0,0); }
    100% { transform: translate3d(-80px,-80px,0); }
}

/* TICKER */
#ticker {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    background:black;
    color:white;
    font-size:12px;
    padding:6px 0;
    overflow:hidden;
    white-space:nowrap;
    z-index:999;
}

#ticker span {
    display:inline-block;
    padding-left:100%;
    animation:tickerMove 18s linear infinite;
}

@keyframes tickerMove {
    0% { transform:translateX(0); }
    100% { transform:translateX(-100%); }
}

/* UI */
.box {
    background:rgba(255,255,255,0.95);
    border:1px solid black;
    margin:15px auto;
    padding:15px;
    width:360px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    border-radius:10px;
}

/* BUTTONS */
button {
    background:white;
    color:black;
    border:1px solid black;
    cursor:pointer;
    font-family:inherit;
}
button:hover {
    box-shadow:0 0 8px rgba(0,0,0,0.4);
}

/* CARDS */
.card {
    display:inline-block;
    width:50px;
    height:70px;
    line-height:70px;
    margin:4px;
    background:black;
    color:white;
    border-radius:6px;

    transform: translateY(-15px) scale(0.9);
    opacity:0;
    animation: deal .25s ease forwards;
}

@keyframes deal {
    to {
        transform: translateY(0) scale(1);
        opacity:1;
    }
}

/* FEED */
#feed {
    font-size:12px;
    text-align:left;
    max-height:120px;
    overflow:auto;
    border-top:1px solid #ccc;
    margin-top:10px;
    padding-top:10px;
}

.feedItem { margin:3px 0; opacity:0.8; }

.coin { font-size:40px; }
.spin { animation:spin .6s; }

@keyframes spin {
    from{transform:rotateY(0)}
    to{transform:rotateY(720deg)}
}
</style>
</head>

<body>

<!-- TICKER -->
<div id="ticker">
    <span id="tickerText">🎰 scribble.bet live casino • blackjack tables open • poker running • coin flips active • good luck gamblers 🎲</span>
</div>

<h1>🖊 scribble.bet</h1>

<div class="box">
<p>Player: <span id="name"></span></p>
<p>Points: <span id="points"></span></p>
</div>

<!-- FEED -->
<div class="box">
<h3>Live Wins Feed</h3>
<div id="feed"></div>
</div>

<!-- COIN -->
<div class="box">
<h3>Coin Flip</h3>
<input id="bet1" type="number">
<div id="coin" class="coin">🪙</div><br>
<button onclick="coin('heads')">Heads</button>
<button onclick="coin('tails')">Tails</button>
</div>

<!-- BLACKJACK -->
<div class="box">
<h3>Blackjack</h3>
<input id="bet2" type="number"><br>

<button onclick="startBJ()">Deal</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>

<p>Player:</p>
<div id="playerCards"></div>

<p>Dealer:</p>
<div id="dealerCards"></div>

<p id="bjRes"></p>
</div>

<!-- POPUP -->
<div id="bjPopup" style="
display:none;
position:fixed;
inset:0;
background:rgba(0,0,0,0.6);
justify-content:center;
align-items:center;
z-index:9999;
">
<div style="
background:white;
padding:20px;
border:2px solid black;
border-radius:10px;
font-size:18px;
">
<div id="bjPopupText"></div>
<br>
<button onclick="document.getElementById('bjPopup').style.display='none'">OK</button>
</div>
</div>

<script>
let username = "scribbler_" + Math.floor(Math.random()*9999);
document.getElementById("name").innerText = username;

let player = JSON.parse(localStorage.getItem("p_"+username)) || {points:1000};
let feed = JSON.parse(localStorage.getItem("feed")||"[]");

function save(){
    localStorage.setItem("p_"+username, JSON.stringify(player));
    localStorage.setItem("feed", JSON.stringify(feed));
}

function update(){
    document.getElementById("points").innerText = player.points;
    renderFeed();
    save();
}

function addFeed(msg){
    feed.unshift(msg);
    feed = feed.slice(0,15);
    renderFeed();
}

function renderFeed(){
    let f=document.getElementById("feed");
    f.innerHTML="";
    feed.forEach(x=>{
        let d=document.createElement("div");
        d.className="feedItem";
        d.innerText=x;
        f.appendChild(d);
    });
}

/* TICKER */
function updateTicker(){
    let msgs = [
        "🎰 Blackjack tables hot",
        "🃏 Poker action rising",
        "💰 Big win detected",
        "🎲 Coin flip streak",
        "🔥 All-in moments",
    ];
    document.getElementById("tickerText").innerText =
        msgs[Math.floor(Math.random()*msgs.length)];
}
setInterval(updateTicker, 5000);

/* COIN */
function coin(choice){
    let bet=+bet1.value;
    if(bet>player.points) return;

    let c=document.getElementById("coin");
    c.classList.add("spin");

    setTimeout(()=>{
        c.classList.remove("spin");
        let r=Math.random()<0.5?"heads":"tails";

        if(r===choice){
            player.points+=bet;
            addFeed(username+" won "+bet+" on coin flip");
        } else {
            player.points-=bet;
        }

        update();
    },600);
}

/* BLACKJACK */
let bj={};

function card(){ return Math.floor(Math.random()*10)+1; }
function sum(a){ return a.reduce((x,y)=>x+y,0); }

function showBJ(){
    document.getElementById("playerCards").innerHTML =
        bj.player.map(x=>`<div class="card">${x}</div>`).join("");

    document.getElementById("dealerCards").innerHTML =
        bj.dealer.map(x=>`<div class="card">${x}</div>`).join("");
}

function popup(text){
    document.getElementById("bjPopupText").innerText=text;
    document.getElementById("bjPopup").style.display="flex";
}

function startBJ(){
    let bet=+bet2.value;
    if(bet>player.points) return;

    bj={bet,player:[card(),card()],dealer:[card(),card()],active:true};
    showBJ();
    document.getElementById("bjRes").innerText="";
}

function hit(){
    if(!bj.active) return;

    bj.player.push(card());
    showBJ();

    if(sum(bj.player)>21){
        player.points-=bj.bet;
        bj.active=false;
        popup("💥 You Lost $" + bj.bet);
        update();
    }
}

function stand(){
    if(!bj.active) return;

    while(sum(bj.dealer)<17){
        bj.dealer.push(card());
        showBJ();
    }

    let p=sum(bj.player), d=sum(bj.dealer);

    if(d>21 || p>d){
        player.points+=bj.bet;
        addFeed(username+" won "+bj.bet+" on blackjack");
        popup("🎉 You Won $" + bj.bet);
    } else {
        player.points-=bj.bet;
        popup("💀 You Lost $" + bj.bet);
    }

    bj.active=false;
    update();
}

update();
</script>

</body>
</html>
