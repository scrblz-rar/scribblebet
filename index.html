<!DOCTYPE html>
<html>
<head>
<title>RNG LAB X</title>

<style>
body {
    margin:0;
    font-family:Arial;
    color:white;
    text-align:center;
    background:black;
    overflow-x:hidden;
}

/* 🔥 NEON DIAGONAL BACKGROUND */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: repeating-linear-gradient(
        135deg,
        rgba(255,255,255,0.05) 0px,
        rgba(255,255,255,0.05) 20px,
        transparent 20px,
        transparent 40px
    );
    animation:bgmove 6s linear infinite;
}

@keyframes bgmove {
    from { transform:translate(-50%,-50%); }
    to { transform:translate(0,0); }
}

/* UI */
.box {
    background:rgba(0,0,0,0.8);
    border:1px solid white;
    margin:15px auto;
    padding:15px;
    width:340px;
    box-shadow:0 0 10px white;
}

/* BUTTONS */
button {
    background:black;
    color:white;
    border:1px solid white;
    box-shadow:0 0 5px white;
}
button:hover {
    box-shadow:0 0 15px white;
}

/* CARDS */
.card {
    display:inline-block;
    width:50px;
    height:70px;
    line-height:70px;
    margin:4px;
    background:white;
    color:black;
    border-radius:6px;
    animation:pop .2s;
}
@keyframes pop { from{transform:scale(0)} to{transform:scale(1)} }

/* COIN */
.coin {
    font-size:50px;
}
.spin {
    animation:spin .6s;
}
@keyframes spin {
    from{transform:rotateY(0)}
    to{transform:rotateY(720deg)}
}

#game { display:none; }
</style>
</head>

<body>

<h1>⚡ RNG LAB X ⚡</h1>

<input id="username" placeholder="Username">
<button onclick="join()">Join</button>
<p id="status"></p>

<div id="game">

<div class="box">
<h2>Stats</h2>
<p>Points: <span id="points"></span></p>
</div>

<!-- COIN -->
<div class="box">
<h2>Coin Flip</h2>
<input id="bet1" type="number">
<div id="coin" class="coin">🪙</div><br>
<button onclick="coin('heads')">Heads</button>
<button onclick="coin('tails')">Tails</button>
<p id="coinResult"></p>
</div>

<!-- BLACKJACK -->
<div class="box">
<h2>Blackjack</h2>
<input id="bet2" type="number"><br>
<button onclick="startBJ()">Deal</button>
<button onclick="hit()">Hit</button>
<button onclick="stand()">Stand</button>

<p>You:</p>
<div id="pCards"></div>

<p>Dealer:</p>
<div id="dCards"></div>

<p id="bjResult"></p>
</div>

<!-- POKER -->
<div class="box">
<h2>Poker</h2>
<input id="bet3" type="number"><br>
<button onclick="playPoker()">Play</button>

<p>You:</p>
<div id="pokerP"></div>

<p>AI:</p>
<div id="pokerAI"></div>

<p id="pokerResult"></p>
</div>

<!-- LEADERBOARD -->
<div class="box">
<h2>Global Leaderboard</h2>
<ul id="board"></ul>
</div>

</div>

<script>
let player, username;
let bj = {active:false, player:[], dealer:[], bet:0};

/* LOGIN FIXED */
function join(){
    username = document.getElementById("username").value.trim();
    if(!username) return status("Enter username");

    try {
        let data = localStorage.getItem("p_"+username);
        player = data ? JSON.parse(data) : {points:1000};
    } catch {
        player = {points:1000};
    }

    if(player.points<=0){
        status("Banned (0 points)");
        return;
    }

    document.getElementById("game").style.display="block";
    status("Logged in as "+username);
    update();
}

function status(t){ document.getElementById("status").innerText=t; }

/* SAVE + "GLOBAL" */
async function save(){
    localStorage.setItem("p_"+username, JSON.stringify(player));

    // FAKE API POST (won’t error if offline)
    try {
        await fetch("https://jsonplaceholder.typicode.com/posts", {
            method:"POST",
            body:JSON.stringify({name:username,points:player.points}),
            headers:{"Content-Type":"application/json"}
        });
    } catch {}

    updateBoard();
}

function update(){
    document.getElementById("points").innerText=player.points;
    save();
}

/* LEADERBOARD */
function updateBoard(){
    let b = JSON.parse(localStorage.getItem("board")||"[]");

    b = b.filter(x=>x.name!==username);
    b.push({name:username,points:player.points});

    // add fake global players
    while(b.length<8){
        b.push({
            name:"User"+Math.floor(Math.random()*9999),
            points:Math.floor(Math.random()*3000)
        });
    }

    b.sort((a,b)=>b.points-a.points);
    b=b.slice(0,10);

    localStorage.setItem("board", JSON.stringify(b));

    let ul=document.getElementById("board");
    ul.innerHTML="";
    b.forEach(p=>{
        let li=document.createElement("li");
        li.innerText=p.name+" - "+p.points;
        ul.appendChild(li);
    });
}

/* COIN */
function coin(choice){
    let bet = +document.getElementById("bet1").value;
    if(bet>player.points) return;

    let c=document.getElementById("coin");
    c.classList.add("spin");

    setTimeout(()=>{
        c.classList.remove("spin");

        let r=Math.random()<0.5?"heads":"tails";
        c.innerText = r==="heads"?"🙂":"🪙";

        if(r===choice) player.points+=bet;
        else player.points-=bet;

        document.getElementById("coinResult").innerText=r;
        end();
    },600);
}

/* BLACKJACK */
function card(){ return Math.floor(Math.random()*10)+1; }
function show(id,arr){
    document.getElementById(id).innerHTML =
        arr.map(x=>`<div class="card">${x}</div>`).join("");
}
function sum(a){ return a.reduce((x,y)=>x+y,0); }

function startBJ(){
    let bet = +document.getElementById("bet2").value;
    if(bet>player.points) return;

    bj={active:true,bet,player:[card(),card()],dealer:[card(),card()]};
    show("pCards",bj.player);
    show("dCards",[bj.dealer[0]]);
}

function hit(){
    if(!bj.active) return;
    bj.player.push(card());
    show("pCards",bj.player);

    if(sum(bj.player)>21){
        player.points-=bj.bet;
        bj.active=false;
        document.getElementById("bjResult").innerText="Bust!";
        end();
    }
}

function stand(){
    if(!bj.active) return;

    while(sum(bj.dealer)<17){
        bj.dealer.push(card());
    }

    show("dCards",bj.dealer);

    let p=sum(bj.player), d=sum(bj.dealer);

    if(d>21 || p>d){
        player.points+=bj.bet;
        document.getElementById("bjResult").innerText="Win";
    } else {
        player.points-=bj.bet;
        document.getElementById("bjResult").innerText="Lose";
    }

    bj.active=false;
    end();
}

/* POKER (REAL HAND RANKING LIGHT) */
function handValue(hand){
    let counts={};
    hand.forEach(c=>counts[c]=(counts[c]||0)+1);

    let values=Object.values(counts).sort((a,b)=>b-a);

    if(values[0]===4) return 7;
    if(values[0]===3 && values[1]===2) return 6;
    if(values[0]===3) return 3;
    if(values[0]===2 && values[1]===2) return 2;
    if(values[0]===2) return 1;
    return 0;
}

function playPoker(){
    let bet = +document.getElementById("bet3").value;
    if(bet>player.points) return;

    let p=[card(),card(),card(),card(),card()];
    let ai=[card(),card(),card(),card(),card()];

    show("pokerP",p);
    show("pokerAI",ai);

    let pv=handValue(p);
    let av=handValue(ai);

    if(pv>av){
        player.points+=bet;
        document.getElementById("pokerResult").innerText="Win";
    } else {
        player.points-=bet;
        document.getElementById("pokerResult").innerText="Lose";
    }

    end();
}

/* END */
function end(){
    if(player.points<=0){
        player.points=0;
        status("Banned");
        document.getElementById("game").style.display="none";
    }
    update();
}
</script>

</body>
</html>
